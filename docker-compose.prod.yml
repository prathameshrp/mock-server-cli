# Production compose stack — designed for a 24/7 VPS deployment.
#
#   ┌─────────┐    :443      ┌──────────┐   :3000   ┌─────────┐
#   │ Caddy   │ ───────────▶ │ gateway  │ ────────▶ │ microcks│   :8080 (internal)
#   │ (auto-  │              │  (node)  │           └─────────┘
#   │  TLS)   │              │          │           ┌──────────────┐
#   │ :80,443 │              │          │ ────────▶ │ mock-oauth2  │ :8080 (internal)
#   └─────────┘              └──────────┘           └──────────────┘
#
# Caddy is the only thing exposed on the public network. Everything
# else talks over the internal `mockstack` network. Auto-TLS kicks in
# when DOMAIN is a real hostname; for DOMAIN=:80 Caddy serves plain
# HTTP on :80 (useful while you're still pointing DNS at the box).
#
# Resource sizing assumes a 6 GB host (Oracle Always Free A1.Flex with
# 1 OCPU is the reference). On bigger boxes you can raise the limits;
# on smaller ones (< 2 GB) you'll want to shrink Microcks first.

# ──────────────────────────────────────────────────────────────────────
# Anchors — reused across services to keep them consistent.
# ──────────────────────────────────────────────────────────────────────

x-logging: &default-logging
  driver: json-file
  options:
    # Cap each container's logs at ~30 MB total. Without this, Docker
    # JSON logging grows forever and will eventually fill the disk.
    max-size: "10m"
    max-file: "3"

services:
  microcks:
    image: quay.io/microcks/microcks-uber:1.10.0
    container_name: mock-microcks
    restart: unless-stopped
    environment:
      KEYCLOAK_ENABLED: "false"
      # The JVM defaults to 25% of host RAM, which is too greedy on a
      # 6 GB shared box. Cap it explicitly.
      JAVA_OPTIONS: "-Xmx768m -Xms256m"
    networks:
      - mockstack
    mem_limit: 1g
    mem_reservation: 384m
    logging: *default-logging
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8080/api/services"]
      interval: 5s
      timeout: 5s
      retries: 20

  mock-oauth2:
    image: ghcr.io/navikt/mock-oauth2-server:2.1.10
    container_name: mock-oauth2
    restart: unless-stopped
    environment:
      LOG_LEVEL: "INFO"
      JAVA_OPTS: "-Xmx256m -Xms64m"
    networks:
      - mockstack
    mem_limit: 384m
    mem_reservation: 96m
    logging: *default-logging
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/default/.well-known/openid-configuration"]
      interval: 5s
      timeout: 5s
      retries: 20

  gateway:
    build:
      context: .
      dockerfile: docker/Dockerfile.gateway
    container_name: mock-gateway
    restart: unless-stopped
    environment:
      PORT: "3000"
      MICROCKS_URL: "http://microcks:8080"
      OAUTH_URL: "http://mock-oauth2:8080"
      # Set in .env so the gateway constructs correct next_page URLs.
      # Falls back to X-Forwarded-Host headers if unset.
      PUBLIC_BASE_URL: "${PUBLIC_BASE_URL:-}"
      TRUST_PROXY: "1"
    depends_on:
      microcks:
        condition: service_healthy
      mock-oauth2:
        condition: service_healthy
    networks:
      - mockstack
    mem_limit: 384m
    mem_reservation: 96m
    logging: *default-logging
    volumes:
      # Hot-update specs without rebuilding the image. Comment this
      # block out if you'd rather treat the baked-in specs as the only
      # source of truth.
      - ./specs:/app/specs:ro
      # Stateful data (created users etc.) — bind-mounted to a host
      # directory so it's visible and backup-able. `tar czf data.tgz
      # data/` is a perfectly good backup strategy.
      - ./data:/app/data

  caddy:
    image: caddy:2.8-alpine
    container_name: mock-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      DOMAIN: "${DOMAIN:-:80}"
    volumes:
      - ./docker/Caddyfile:/etc/caddy/Caddyfile:ro
      # Cert state persists across restarts so we don't re-issue (and
      # don't burn Let's Encrypt rate limit) on every `compose up`.
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - gateway
    networks:
      - mockstack
    mem_limit: 256m
    mem_reservation: 64m
    logging: *default-logging

networks:
  mockstack:
    driver: bridge

volumes:
  caddy_data:
  caddy_config:
