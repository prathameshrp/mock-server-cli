services:
  microcks:
    image: quay.io/microcks/microcks-uber:1.10.0
    container_name: mock-microcks
    ports:
      - "8585:8080"
    environment:
      KEYCLOAK_ENABLED: "false"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8080/api/services"]
      interval: 5s
      timeout: 5s
      retries: 20

  mock-oauth2:
    image: ghcr.io/navikt/mock-oauth2-server:2.1.10
    container_name: mock-oauth2
    ports:
      - "8181:8080"
    environment:
      LOG_LEVEL: "INFO"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/default/.well-known/openid-configuration"]
      interval: 5s
      timeout: 5s
      retries: 20
